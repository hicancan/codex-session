<svg xmlns="http://www.w3.org/2000/svg" width="600" height="420" viewBox="0 0 600 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#313244"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </linearGradient>
  </defs>

  <!-- Window -->
  <rect x="20" y="20" width="560" height="380" rx="10" fill="url(#bg)" stroke="#45475a" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="560" height="32" rx="10" fill="url(#titlebar)"/>
  <rect x="20" y="40" width="560" height="12" fill="url(#titlebar)"/>
  <circle cx="40" cy="36" r="6" fill="#f38ba8"/>
  <circle cx="60" cy="36" r="6" fill="#fab387"/>
  <circle cx="80" cy="36" r="6" fill="#a6e3a1"/>
  <text x="300" y="40" text-anchor="middle" font-family="Segoe UI, Consolas, monospace" font-size="11" fill="#a6adc8">PowerShell 7  —  codex-session</text>

  <!-- Terminal content -->
  <g font-family="Consolas, 'Cascadia Code', monospace" font-size="12">
    <!-- Prompt + command -->
    <text x="35" y="76" fill="#f5c2e7">PS</text>
    <text x="55" y="76" fill="#cdd6f4"> D:\ </text>
    <text x="85" y="76" fill="#a6e3a1">></text>
    <text x="100" y="76" fill="#89b4fa" font-weight="bold"> codex-session</text>

    <!-- Output after auto-save -->
    <text x="35" y="98" fill="#a6adc8">Synced:</text>
    <text x="100" y="98" fill="#cdd6f4"> alice@gmail.com</text>

    <!-- Account list -->
    <text x="35" y="124" fill="#a6adc8">  [0]</text>
    <text x="70" y="124" fill="#f9e2af"> *</text>
    <text x="85" y="124" fill="#cdd6f4"> alice@gmail.com</text>
    <text x="35" y="144" fill="#a6adc8">  [1]</text>
    <text x="70" y="144" fill="#a6adc8"> </text>
    <text x="85" y="144" fill="#cdd6f4"> bob@outlook.com</text>
    <text x="35" y="164" fill="#a6adc8">  [2]</text>
    <text x="70" y="164" fill="#a6adc8"> </text>
    <text x="85" y="164" fill="#cdd6f4"> charlie@gmail.com</text>

    <!-- Menu -->
    <text x="35" y="192" fill="#6c7086">  ─────────────────────────</text>
    <text x="35" y="214" fill="#a6adc8">  [l] Full detail table</text>
    <text x="35" y="234" fill="#a6adc8">  [d] Logout (for new login)</text>
    <text x="35" y="254" fill="#a6adc8">  [q] Quit</text>

    <!-- User input: switch -->
    <text x="35" y="286" fill="#f5c2e7">></text>
    <text x="55" y="286" fill="#89b4fa"> 2</text>

    <!-- Switch output -->
    <text x="35" y="314" fill="#a6e3a1">Switched to:</text>
    <text x="140" y="314" fill="#cdd6f4"> charlie@gmail.com (team)</text>

    <!-- Prompt after switch -->
    <text x="35" y="346" fill="#f5c2e7">PS</text>
    <text x="55" y="346" fill="#cdd6f4"> D:\ </text>
    <text x="85" y="346" fill="#a6e3a1">></text>
    <text x="100" y="346" fill="#89b4fa" font-weight="bold"> codex-session list</text>

    <!-- Table row -->
    <text x="35" y="374" fill="#94e2d5">A  Email               Name     Plan      Provider</text>
    <text x="35" y="392" fill="#6c7086">-  -----               ----     ----      --------</text>
  </g>
</svg>
